<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | QR code component</title>
  <!-- displays site properly based on user's device -->

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->

  <style>
    body {
      background-color: hsl(216, 90%, 88%); 
    }
    .container{
      display: flex;
      justify-content: center;
    }
    .content {
      background-color: white;
      width:fit-content;
      border-radius: 8px;
      text-align: center;
      padding: 10px;
      margin-top: 100px;
    }
    img {
      height: 150px;
      width: 210px;
      border-radius: 4px;
    }
    p {
      font-family:Outfit, ("https://fonts.google.com/specimen/Outfit");
      font-size: 15px;
      color: grey;
      display: inline;
    }

    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="content">

      <img src="./images/image-qr-code.png" alt="QR code">

      <div class="text">
        <h3>Improve your front-end <br>skills by building projects</h3>
      <p>Scan the QR code to visit frontend <br> Mentor and take your coding to <br> the next level</p>
      </div>
    </div>
  </div> <br>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Hyden</a>.
  </footer>
</body>

</html>
